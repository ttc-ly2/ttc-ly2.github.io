<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflection Lab: Adjustable Grid</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f6f8; user-select: none; overflow: hidden; }
        
        /* CONTROLS COLUMN */
        #apparatus-col {
            width: 280px;
            min-width: 280px;
            background: #fff;
            border-right: 1px solid #dce1e6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 10;
            overflow-y: auto;
        }

        /* GRID COLUMN */
        #grid-col {
            flex-grow: 1;
            position: relative;
            background-color: #f8f9fa;
            background-image: 
                linear-gradient(#e1e4e8 1px, transparent 1px),
                linear-gradient(90deg, #e1e4e8 1px, transparent 1px);
            /* Default size, updated by JS */
            background-size: 20px 20px; 
            overflow: hidden;
            cursor: default;
        }

        /* UI ELEMENTS */
        h2 { font-size: 1.2rem; font-weight: 600; color: #2c3e50; margin-top: 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 12px; margin-bottom: 20px;}
        .control-group { margin-bottom: 24px; }
        label.section-label { display: block; font-size: 0.85rem; font-weight: 700; color: #546e7a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .ray-selector { display: flex; border: 1px solid #cfd8dc; border-radius: 6px; overflow: hidden; }
        .ray-selector button {
            flex: 1; border: none; background: #f5f7f9; padding: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: #546e7a;
            border-right: 1px solid #cfd8dc; transition: all 0.2s ease;
        }
        .ray-selector button:last-child { border-right: none; }
        .ray-selector button.active { background: #2196F3; color: white; }

        input[type=range] { width: 100%; margin: 8px 0; cursor: pointer; }
        input[type=range]:disabled { opacity: 0.4; cursor: not-allowed; }

        .checkbox-group label { display: flex; align-items: center; font-size: 0.95rem; color: #34495e; margin-bottom: 8px; cursor: pointer; }
        .checkbox-group input { margin-right: 10px; transform: scale(1.1); }

        .highlight-box { background: #e3f2fd; border: 1px solid #90caf9; padding: 10px; border-radius: 6px; margin-bottom: 8px; }

        .legend-box { background: #f0f4f8; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; font-size: 0.85rem; margin-bottom: 6px; color: #546e7a; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }

        button#save-btn {
            margin-top: auto;
            background: #2ecc71;
            color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 1.05rem; font-weight: 600;
            transition: 0.2s; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        button#save-btn:hover { background: #27ae60; transform: translateY(-1px); }
        
        .hint { font-size: 0.8rem; color: #90a4ae; font-style: italic;}
    </style>
</head>
<body>

    <div id="apparatus-col">
        <h2>Lab Controls</h2>
        
        <div class="control-group">
            <label class="section-label">Environment</label>
            
            <label style="font-size: 0.9rem; font-weight: 600; color: #546e7a;">Grid Size</label>
            <input type="range" id="grid-size" min="10" max="100" value="20">

            <label style="font-size: 0.9rem; font-weight: 600; color: #546e7a; margin-top:10px;">Mirror Length</label>
            <input type="range" id="mirror-length" min="100" max="600" value="300">
        </div>

        <div class="control-group">
            <label class="section-label">Ray Source</label>
            <div class="ray-selector">
                <button id="btn-1-ray" onclick="setRayCount(1)">Single Ray</button>
                <button id="btn-3-ray" class="active" onclick="setRayCount(3)">Three Rays</button>
            </div>
            <div style="margin-top: 12px;">
                 <label style="font-size: 0.9rem; font-weight: 600; color: #546e7a;">Divergence (Spread)</label>
                 <input type="range" id="beam-spread" min="0" max="30" value="15">
                 <div class="hint" id="spread-hint">Disabled when Single Ray is selected</div>
            </div>
        </div>

        <div class="control-group checkbox-group">
            <label class="section-label">Visibility</label>
            <label><input type="checkbox" id="chk-normal" checked> Show Normal Line</label>
            <label><input type="checkbox" id="chk-extensions" checked> Show Virtual Rays</label>
        </div>

        <div class="control-group checkbox-group" style="border-top: 2px solid #f0f2f5; padding-top: 20px;">
             <label class="section-label">Measurement Tool</label>
            <label><input type="checkbox" id="chk-protractor" checked> Enable Protractor</label>
            
            <div class="highlight-box">
                <label style="margin-bottom: 0; font-weight: 600;">
                    <input type="checkbox" id="chk-attach"> Attach to Mirror
                </label>
                <div class="hint" style="margin-left: 24px; margin-top:4px;">
                    Locks protractor to the front of the mirror.
                </div>
            </div>
        </div>

        <div class="legend-box">
            <label class="section-label" style="margin-bottom: 10px;">Legend</label>
            <div class="legend-item"><div class="dot" style="background:#e74c3c;"></div> Incident Ray</div>
            <div class="legend-item"><div class="dot" style="background:#3498db;"></div> Reflected Ray</div>
            <div class="legend-item"><div class="dot" style="background:rgba(52, 152, 219, 0.4);"></div> Virtual Ray</div>
        </div>

        <button id="save-btn" onclick="saveDiagram()">Save Diagram 📸</button>
    </div>

    <div id="grid-col">
        <canvas id="simCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const gridCol = document.getElementById('grid-col');

    // --- RESIZE ---
    function resize() {
        canvas.width = gridCol.clientWidth;
        canvas.height = gridCol.clientHeight;
        draw();
    }
    window.addEventListener('resize', resize);

    // --- STATE VARIABLES ---
    const mirror = { x: canvas.width/2, y: canvas.height*0.6, length: 300, angle: 0, snapped: false }; 
    const box = { x: canvas.width/2, y: canvas.height*0.2, angle: Math.PI/2, spread: 15 * (Math.PI/180), rayCount: 3, snapped: true };
    const protractor = { x: 150, y: canvas.height-150, angle: 0, radius: 120, visible: true, attached: false, snapped: false };

    // Interaction State
    let dragging = null; 
    let action = null;   

    // DOM Elements
    const uiGridSize = document.getElementById('grid-size');
    const uiMirrorLen = document.getElementById('mirror-length');
    const uiSpread = document.getElementById('beam-spread');
    const uiNormal = document.getElementById('chk-normal');
    const uiExt = document.getElementById('chk-extensions');
    const uiProt = document.getElementById('chk-protractor');
    const uiAttach = document.getElementById('chk-attach');
    const btn1 = document.getElementById('btn-1-ray');
    const btn3 = document.getElementById('btn-3-ray');
    const spreadHint = document.getElementById('spread-hint');

    function setRayCount(n) {
        box.rayCount = n;
        if(n === 1) {
            btn1.classList.add('active'); btn3.classList.remove('active');
            uiSpread.disabled = true; spreadHint.style.opacity = 1;
        } else {
            btn3.classList.add('active'); btn1.classList.remove('active');
            uiSpread.disabled = false; spreadHint.style.opacity = 0;
        }
        draw();
    }
    setRayCount(3); 

    // --- DRAW LOOP ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Update state from UI
        mirror.length = parseInt(uiMirrorLen.value);
        box.spread = parseInt(uiSpread.value) * (Math.PI/180);
        protractor.visible = uiProt.checked;
        protractor.attached = uiAttach.checked;

        // Update CSS Grid Size
        const gs = uiGridSize.value + 'px';
        gridCol.style.backgroundSize = `${gs} ${gs}`;

        if (protractor.attached) {
            protractor.x = mirror.x;
            protractor.y = mirror.y;
            protractor.angle = mirror.angle;
        }

        drawMirror();
        drawRays();
        drawRayBox();
        if(protractor.visible) drawProtractor();
    }

    // Helper: Arrowheads
    function drawArrowhead(x, y, angle) {
        const headLen = 14; 
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(-headLen, -headLen/2.5);
        ctx.lineTo(0, 0);
        ctx.lineTo(-headLen, headLen/2.5);
        ctx.closePath();
        ctx.fillStyle = ctx.strokeStyle; 
        ctx.fill();
        ctx.restore();
    }

    function drawMirror() {
        ctx.save();
        ctx.translate(mirror.x, mirror.y);
        ctx.rotate(mirror.angle);

        // Surface
        ctx.beginPath();
        ctx.moveTo(-mirror.length/2, 0);
        ctx.lineTo(mirror.length/2, 0);
        ctx.lineWidth = 6;
        ctx.strokeStyle = "#3498db";
        ctx.stroke();

        // Hashes
        ctx.lineWidth = 1;
        ctx.strokeStyle = "#b0bec5";
        for(let i = -mirror.length/2; i < mirror.length/2; i+=12) {
            ctx.beginPath(); ctx.moveTo(i, -1); ctx.lineTo(i-6, -8); ctx.stroke();
        }

        drawHandle(0, 0, 'move');
        drawHandle(mirror.length/2, 0, 'rotate', mirror.snapped); 

        ctx.restore();
    }

    function drawRayBox() {
        ctx.save();
        ctx.translate(box.x, box.y);
        ctx.rotate(box.angle);

        ctx.fillStyle = "#37474f";
        ctx.roundRect(-25, -20, 50, 40, 4);
        ctx.fill();
        
        ctx.fillStyle = "#eceff1";
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("LASER", 0, 4);

        ctx.fillStyle = "#e74c3c";
        ctx.beginPath(); ctx.arc(25, 0, 4, 0, Math.PI*2); ctx.fill();

        drawHandle(0, 0, 'move');
        drawHandle(40, 0, 'rotate', box.snapped); 

        ctx.restore();
    }

    function drawProtractor() {
        ctx.save();
        ctx.translate(protractor.x, protractor.y);
        ctx.rotate(protractor.angle);

        ctx.beginPath(); ctx.arc(0, 0, protractor.radius, 0, Math.PI); 
        ctx.fillStyle = "rgba(255, 193, 7, 0.3)"; ctx.fill();
        ctx.strokeStyle = "#ffa000"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath(); ctx.moveTo(-protractor.radius, 0); ctx.lineTo(protractor.radius, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fillStyle="#e65100"; ctx.fill();

        ctx.fillStyle = "#37474f"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold 11px sans-serif";
        
        for (let i = 0; i <= 180; i+=10) {
            let rad = i * (Math.PI / 180);
            let x1 = Math.cos(rad) * protractor.radius;
            let y1 = Math.sin(rad) * protractor.radius;
            let tickLen = (i%30===0 ? 15 : 8);
            let x2 = Math.cos(rad) * (protractor.radius - tickLen);
            let y2 = Math.sin(rad) * (protractor.radius - tickLen);
            
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

             if (i % 30 === 0) {
                let textDist = protractor.radius - 28;
                let xText = Math.cos(rad) * textDist;
                let yText = Math.sin(rad) * textDist;
                ctx.save();
                ctx.translate(xText, yText);
                ctx.rotate(-protractor.angle); 
                ctx.fillText(i, 0, 0);
                ctx.restore();
             }
        }

        if (!protractor.attached) {
            drawHandle(0, 0, 'move');
            drawHandle(protractor.radius, 0, 'rotate', protractor.snapped);
        }
        ctx.restore();
    }

    function drawHandle(x, y, type, isSnapped = false) {
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI*2);
        if (type === 'move') {
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#455a64";
        } else {
            ctx.fillStyle = isSnapped ? "#2ecc71" : "#26c6da"; 
            ctx.strokeStyle = isSnapped ? "#27ae60" : "#fff";
        }
        ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
    }

    // --- RAY TRACING ---
    function drawRays() {
        let rays = (box.rayCount === 1) ? [0] : [0, -box.spread, box.spread];
        rays.forEach(offset => castRay(box.angle + offset));
    }

    function castRay(rayAngle) {
        const rayLen = 2000;
        let dx = Math.cos(rayAngle), dy = Math.sin(rayAngle);
        let mx = Math.cos(mirror.angle), my = Math.sin(mirror.angle);
        let nx = -my, ny = mx; 

        let det = dx * my - dy * mx;
        if (Math.abs(det) < 1e-6) return;

        let t = ((mirror.x - box.x) * my - (mirror.y - box.y) * mx) / det;
        let u = ((mirror.x - box.x) * dy - (mirror.y - box.y) * dx) / det;
        
        if (t > 0.1 && Math.abs(u) <= mirror.length / 2) {
            let ix = box.x + t * dx;
            let iy = box.y + t * dy;

            // Incident
            ctx.beginPath(); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3;
            ctx.moveTo(box.x, box.y); ctx.lineTo(ix, iy); ctx.stroke();
            drawArrowhead((box.x+ix)/2, (box.y+iy)/2, rayAngle);

            // Reflection
            let dot = dx * nx + dy * ny;
            let effNx = nx, effNy = ny;
            if (dot > 0) { effNx = -nx; effNy = -ny; dot = -dot; } 
            
            let rx = dx - 2 * dot * effNx;
            let ry = dy - 2 * dot * effNy;
            let reflectAngle = Math.atan2(ry, rx);

            // Reflected
            ctx.beginPath(); ctx.strokeStyle = "#3498db";
            ctx.moveTo(ix, iy); ctx.lineTo(ix + rx * rayLen, iy + ry * rayLen); ctx.stroke();
            drawArrowhead(ix + rx * 100, iy + ry * 100, reflectAngle);

            if (uiNormal.checked) {
                ctx.beginPath(); ctx.setLineDash([6, 6]); ctx.strokeStyle = "#78909c"; ctx.lineWidth = 1;
                ctx.moveTo(ix, iy); ctx.lineTo(ix + effNx * 60, iy + effNy * 60); ctx.stroke(); ctx.setLineDash([]);
            }

            if (uiExt.checked) {
                ctx.beginPath(); ctx.setLineDash([3, 6]); ctx.strokeStyle = "rgba(52, 152, 219, 0.5)"; ctx.lineWidth = 2;
                ctx.moveTo(ix, iy); ctx.lineTo(ix - rx * rayLen, iy - ry * rayLen); ctx.stroke(); ctx.setLineDash([]);
            }
        } else {
            ctx.beginPath(); ctx.strokeStyle = "rgba(231, 76, 60, 0.25)"; ctx.lineWidth = 2;
            ctx.moveTo(box.x, box.y); ctx.lineTo(box.x + dx * rayLen, box.y + dy * rayLen); ctx.stroke();
            drawArrowhead(box.x + dx * 150, box.y + dy * 150, rayAngle);
        }
    }

    // --- MOUSE INPUT ---
    function getLocalPos(obj, mx, my) {
        let tx = mx - obj.x; let ty = my - obj.y;
        let rx = tx * Math.cos(-obj.angle) - ty * Math.sin(-obj.angle);
        let ry = tx * Math.sin(-obj.angle) + ty * Math.cos(-obj.angle);
        return { x: rx, y: ry };
    }

    function checkHit(obj, mx, my, type) {
        let local = getLocalPos(obj, mx, my);
        if (Math.sqrt(local.x**2 + local.y**2) < 15) return 'move';
        
        let hx = 0;
        if (type === 'mirror') hx = obj.length/2; 
        if (type === 'box') hx = 40;
        if (type === 'protractor') hx = obj.radius;

        if (Math.sqrt((local.x - hx)**2 + local.y**2) < 15) return 'rotate';
        return null;
    }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;

        if (protractor.visible && !protractor.attached) {
            let h = checkHit(protractor, mx, my, 'protractor');
            if (h) { dragging = 'protractor'; action = h; return; }
        }
        let hBox = checkHit(box, mx, my, 'box');
        if (hBox) { dragging = 'box'; action = hBox; return; }
        let hMirror = checkHit(mirror, mx, my, 'mirror');
        if (hMirror) { dragging = 'mirror'; action = hMirror; return; }
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;

        let hover = false;
        [box, mirror].forEach(obj => { if(checkHit(obj,mx,my,(obj===mirror?'mirror':'box'))) hover=true; });
        if(protractor.visible && !protractor.attached && checkHit(protractor,mx,my,'protractor')) hover=true;

        canvas.style.cursor = hover ? 'grab' : 'default';
        if(dragging) canvas.style.cursor = 'grabbing';

        if (!dragging) return;
        let obj = (dragging === 'mirror') ? mirror : (dragging === 'box') ? box : protractor;

        if (action === 'move') {
            obj.x = mx; obj.y = my;
        } else if (action === 'rotate') {
            let rawAngle = Math.atan2(my - obj.y, mx - obj.x);
            const snapThreshold = 6 * (Math.PI / 180); 
            const targets = [0, Math.PI/2, Math.PI, -Math.PI/2, -Math.PI];
            let snapped = false;
            for (let t of targets) {
                if (Math.abs(rawAngle - t) < snapThreshold) {
                    rawAngle = t; snapped = true; break;
                }
            }
            obj.angle = rawAngle;
            obj.snapped = snapped;
        }
        draw();
    });

    canvas.addEventListener('mouseup', () => dragging = null);

    // --- SAVE ---
    function saveDiagram() {
        ctx.save();
        ctx.font = "italic 14px sans-serif";
        ctx.fillStyle = "#546e7a";
        ctx.textAlign = "right";
        ctx.textBaseline = "bottom";
        const now = new Date();
        const dateStr = now.toLocaleDateString() + " " + now.toLocaleTimeString();
        ctx.fillText(dateStr, canvas.width - 15, canvas.height - 15);
        ctx.restore();

        const link = document.createElement('a');
        const filenameTS = now.getFullYear() + 
            String(now.getMonth()+1).padStart(2,'0') + 
            String(now.getDate()).padStart(2,'0') + "_" +
            String(now.getHours()).padStart(2,'0') + 
            String(now.getMinutes()).padStart(2,'0') + 
            String(now.getSeconds()).padStart(2,'0');
            
        link.download = `ReflectionLab_${filenameTS}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        draw(); 
    }

    uiGridSize.addEventListener('input', draw);
    uiMirrorLen.addEventListener('input', draw);
    uiSpread.addEventListener('input', draw);
    uiNormal.addEventListener('change', draw);
    uiExt.addEventListener('change', draw);
    uiProt.addEventListener('change', draw);
    uiAttach.addEventListener('change', draw);

    if (!ctx.roundRect) ctx.roundRect = function(x, y, w, h, r) { ctx.rect(x,y,w,h); };
    setTimeout(resize, 100);
    
</script>
</body>
</html>
